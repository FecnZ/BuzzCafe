spring.application.name=buzzcafe-backend

# 1. Habilitar la consola
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 2. Configuración de la BD (Usa guiones, no CamelCase)
spring.datasource.url=jdbc:h2:mem:buzzcafedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 3. Importante para evitar el 404 en la consola
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=true
logging.level.org.springframework.boot.autoconfigure.h2=DEBUG

# Usa una cadena larga y aleatoria. ¡No la compartas!
buzzcafe.jwt.secret=EstaEsUnaLlaveSuperSecretaYMuyLargaParaQueSeaSegura1234567890
# Tiempo de vida del token (ej. 24 horas en milisegundos)
buzzcafe.jwt.expiration=86400000